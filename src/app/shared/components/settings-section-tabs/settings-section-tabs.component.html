<div class="flex flex-wrap gap-2 mb-4 sm:mb-6" role="tablist">
  @for (t of tabs; track t.id) {
    <button
      type="button"
      role="tab"
      [attr.aria-selected]="activeId === t.id"
      (click)="pick(t.id)"
      class="px-3 sm:px-4 py-2 rounded-lg text-xs sm:text-sm font-medium border transition-colors"
      [ngClass]="
        activeId === t.id
          ? 'border-purple-500/50 bg-purple-500/20 text-white'
          : 'glass-effect-subtle border-white/20 text-gray-300 hover:bg-white/10'
      "
    >
      {{ t.label }}
    </button>
  }
</div>
